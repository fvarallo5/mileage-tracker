# Use ../render.yaml (repo root) for Blueprint deploy — this file is a reference copy.
services:
  - type: web
    name: mileage-tracker-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
    disk:
      name: mileage-data
      mountPath: /app/data
      sizeGB: 1
name: mileage_tracker
description: GPS mileage tracker with tips and expense reports.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^13.0.2
  http: ^1.2.2
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  file_picker: ^8.3.7
  google_fonts: ^6.2.1
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1
  flutter_app_intents: ^0.7.0
  permission_handler: ^11.4.0
  in_app_purchase: ^3.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#0A0E14"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter_native_splash:
  color: "#0A0E14"
  image: assets/icon/app_icon.png
  android_12:
    color: "#0A0E14"
    image: assets/icon/app_icon.png

flutter:
  uses-material-design: true
# Render Blueprint — deploy from repo root (https://render.com → New → Blueprint)
services:
  - type: web
    name: mileage-tracker-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
    disk:
      name: mileage-data
      mountPath: /app/data
      sizeGB: 1